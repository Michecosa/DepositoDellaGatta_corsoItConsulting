<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro - Glass Minimal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        primary: '#3B82F6',
                        textMain: '#1F2937',
                        textMuted: '#6B7280',
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- FontAwesome JS for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#F8FAFC] text-textMain min-h-screen antialiased flex flex-col">

    <!-- Main Window Container -->
    <div class="container mx-auto max-w-5xl mt-10 xp-window shadow-2xl">
        <!-- XP Title Bar -->
        <div class="xp-title-bar">
            <div class="xp-title-text">
                <i class="fa-solid fa-check-double scale-75"></i>
                Gestione Task - TaskMaster Pro
            </div>
            <div class="flex gap-1" id="windowControls">
                <div class="w-[21px] h-[21px] bg-gradient-to-b from-[#3a91ff] to-[#0058e6] border border-[#003c74] rounded-[2px] flex items-center justify-center text-white text-[14px]">_</div>
                <div class="w-[21px] h-[21px] bg-gradient-to-b from-[#3a91ff] to-[#0058e6] border border-[#003c74] rounded-[2px] flex items-center justify-center text-white text-[10px]">▢</div>
                <div class="xp-close-btn" title="Chiudi">✕</div>
            </div>
        </div>

        <div class="xp-content text-textMain min-h-[600px]">

        <main class="flex flex-col">
            
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Aggiungi Attività</h2>
                <!-- Search Bar (XP Style) -->
                <div class="relative w-64">
                    <input type="text" id="searchInput" placeholder="Cerca task..." class="xp-input w-full pl-8">
                    <i class="fa-solid fa-search absolute left-2 top-1/2 transform -translate-y-1/2 text-gray-500 text-sm"></i>
                </div>
            </div>
            
            <!-- Add Task Section (XP Panel) -->
            <section class="bg-[#d6d3c2] border border-white/50 p-4 mb-6 xp-inset flex flex-col lg:flex-row gap-5 items-center">
                
                <div class="w-full lg:flex-grow relative flex gap-3 items-center">
                    <input type="text" id="newTaskDesc" placeholder="Nuovo task..." class="xp-input w-full">
                </div>
                
                <div class="w-full lg:w-auto flex justify-between lg:justify-end items-center gap-6 shrink-0">
                    <div class="flex items-center gap-3">
                        <label class="text-xs font-bold text-gray-700">Priorità:</label>
                        <div class="flex gap-1" id="priorityContainer">
                            <button onclick="setPriority(1)" id="prio-1" class="xp-button xp-button-classic">1</button>
                            <button onclick="setPriority(2)" id="prio-2" class="xp-button xp-button-classic">2</button>
                            <button onclick="setPriority(3)" id="prio-3" class="xp-button xp-button-classic">3</button>
                        </div>
                    </div>
                    
                    <button id="createBtn" onclick="createTask()" class="xp-button xp-button-green">
                        <i class="fa-solid fa-plus text-xs"></i> Crea
                    </button>
                </div>
            </section>

            <!-- Filters (Tabs) -->
            <div class="xp-tabs mb-4 px-1 border-b border-gray-400">
                <button onclick="setFilter('ALL')" id="filter-ALL" class="xp-tab xp-tab-active">Tutti i Task</button>
                <button onclick="setFilter('TODO')" id="filter-TODO" class="xp-tab">Da Fare</button>
                <button onclick="setFilter('IN_PROGRESS')" id="filter-IN_PROGRESS" class="xp-tab">In Corso</button>
                <button onclick="setFilter('DONE')" id="filter-DONE" class="xp-tab">Completati</button>
                <button onclick="setFilter('CANCELLED')" id="filter-CANCELLED" class="xp-tab">Annullati</button>
            </div>

        <!-- Notification Area -->
        <div id="notification-area" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

            <!-- Task List Grid -->
            <div id="loadingIndicator" class="flex justify-center items-center py-12 hidden">
                <i class="fa-solid fa-hourglass-half fa-spin text-2xl text-blue-600"></i>
            </div>
            
            <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-gray-700 bg-white border border-gray-400 xp-inset">
                <i class="fa-regular fa-folder-open text-4xl mb-3 text-gray-400"></i>
                <p class="text-base font-bold">Nessun file trovato in questa cartella.</p>
                <p class="text-xs mt-1">Sposta i tuoi file qui o crea un nuovo task.</p>
            </div>

            <div id="taskGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-12">
                <!-- Cards will be dynamically inserted here -->
            </div>

        </main>
    </div> <!-- Close xp-content -->
</div> <!-- Close xp-window -->

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Custom logic -->
    <script src="app.js"></script>
</body>
</html>
