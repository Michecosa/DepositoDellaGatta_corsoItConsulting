<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro - Glass Minimal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        primary: '#3B82F6',
                        textMain: '#1F2937',
                        textMuted: '#6B7280',
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- FontAwesome JS for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#F8FAFC] text-textMain min-h-screen antialiased flex flex-col">

    <!-- Sfondo Animato Blob -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Header Section (Glass) -->
    <header class="w-full bg-white/60 backdrop-blur-md border-b border-white/40 shadow-sm shadow-blue-500/5 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-check-double text-xl text-primary"></i>
                <h1 class="text-xl font-bold tracking-tight">TaskMaster</h1>
            </div>
            
            <!-- Search Bar (Glass inside) -->
            <div class="relative hidden mx-auto md:block w-72">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-textMuted text-sm"></i>
                <input type="text" id="searchInput" placeholder="Cerca task..." class="w-full bg-white/40 backdrop-blur-sm shadow-inner border border-white/50 rounded-md py-1.5 pl-9 pr-4 text-sm focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all text-textMain placeholder-textMuted">
            </div>
            
            <div class="w-24"></div> <!-- Spacer per bilanciare header -->
        </div>
    </header>

    <main class="container mx-auto max-w-5xl px-6 py-8 flex-grow flex flex-col z-10 transition-opacity duration-300">
        
        <h2 class="text-2xl font-bold mb-6">Gestione Task</h2>
        
        <!-- Add Task Section (Glass Panel) -->
        <section class="bg-white/40 backdrop-blur-lg mb-8 py-5 px-6 rounded-xl border border-white/50 shadow-lg shadow-blue-500/5 flex flex-col lg:flex-row gap-5 items-center">
            
            <div class="w-full lg:flex-grow relative flex gap-3 items-center">
                <input type="text" id="newTaskDesc" placeholder="Aggiungi una nuova attività..." class="w-full bg-white/60 backdrop-blur-md shadow-inner border border-white/70 rounded-md py-2.5 px-4 focus:outline-none focus:border-primary/50 transition-all text-textMain placeholder-textMuted text-sm sm:text-base">
            </div>
            
            <div class="w-full lg:w-auto flex justify-between lg:justify-end items-center gap-6 shrink-0">
                <div class="flex items-center gap-3">
                    <label class="text-sm font-medium text-textMuted hidden sm:block">Priorità:</label>
                    <div class="flex gap-1.5 p-1 bg-white/40 backdrop-blur-md border border-white/60 rounded-lg shadow-sm" id="priorityContainer">
                        <button onclick="setPriority(1)" id="prio-1" class="w-8 h-8 rounded-md flex items-center justify-center font-medium text-sm transition-all focus:outline-none">1</button>
                        <button onclick="setPriority(2)" id="prio-2" class="w-8 h-8 rounded-md flex items-center justify-center font-medium text-sm transition-all focus:outline-none">2</button>
                        <button onclick="setPriority(3)" id="prio-3" class="w-8 h-8 rounded-md flex items-center justify-center font-medium text-sm transition-all focus:outline-none">3</button>
                    </div>
                </div>
                
                <button id="createBtn" onclick="createTask()" class="h-10 px-6 rounded-md bg-primary hover:bg-blue-600 text-white font-medium text-sm transition-colors shadow-lg shadow-blue-500/20 flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-solid fa-plus text-xs"></i> Crea
                </button>
            </div>
        </section>

        <!-- Filters (Tabs) -->
        <div class="flex gap-6 mb-6 border-b border-gray-200/50 w-full overflow-x-auto custom-scrollbar">
            <button onclick="setFilter('ALL')" id="filter-ALL" class="tab-btn tab-active pb-2.5 px-1 text-sm text-textMuted hover:text-textMain transition-colors whitespace-nowrap">Tutti i Task</button>
            <button onclick="setFilter('TODO')" id="filter-TODO" class="tab-btn pb-2.5 px-1 text-sm text-textMuted hover:text-textMain transition-colors whitespace-nowrap">Da Fare</button>
            <button onclick="setFilter('IN_PROGRESS')" id="filter-IN_PROGRESS" class="tab-btn pb-2.5 px-1 text-sm text-textMuted hover:text-textMain transition-colors whitespace-nowrap">In Corso</button>
            <button onclick="setFilter('DONE')" id="filter-DONE" class="tab-btn pb-2.5 px-1 text-sm text-textMuted hover:text-textMain transition-colors whitespace-nowrap">Completati</button>
            <button onclick="setFilter('CANCELLED')" id="filter-CANCELLED" class="tab-btn pb-2.5 px-1 text-sm text-textMuted hover:text-textMain transition-colors whitespace-nowrap">Annullati</button>
        </div>

        <!-- Notification Area -->
        <div id="notification-area" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

        <!-- Task List Grid -->
        <div id="loadingIndicator" class="flex justify-center items-center py-12 hidden">
            <i class="fa-solid fa-circle-notch fa-spin text-2xl text-textMuted"></i>
        </div>
        
        <div id="emptyState" class="hidden flex-col items-center justify-center py-16 text-textMuted bg-white/40 backdrop-blur-md rounded-xl border border-white/50 border-dashed shadow-sm">
            <i class="fa-regular fa-folder-open text-4xl mb-3 text-gray-400"></i>
            <p class="text-base font-medium text-textMain">Nessuna attività trovata.</p>
            <p class="text-sm mt-1">Crea una nuova task o naviga nei filtri.</p>
        </div>

        <div id="taskGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-12">
            <!-- Cards will be dynamically inserted here -->
        </div>

    </main>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Custom logic -->
    <script src="app.js"></script>
</body>
</html>
