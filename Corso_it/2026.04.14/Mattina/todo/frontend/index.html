<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Todo App</title>
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind Configuration for custom theming -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#6366f1',
                            600: '#4f46e5',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen text-slate-100 font-sans antialiased overflow-hidden flex flex-col">
    <!-- Main content container -->
    <div class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto p-4 sm:p-6 lg:p-8 flex flex-col">
        
        <!-- Header -->
        <header class="text-center mb-10 mt-8 animate-fade-in-down">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-2 drop-shadow-md">
                Task Manager
            </h1>
            <p class="text-slate-400 text-lg">Organizza la tua giornata con stile</p>
        </header>

        <!-- Glassmorphism Card (Main Area) -->
        <main class="bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl rounded-3xl p-6 sm:p-8 flex-1 flex flex-col relative animate-fade-in-up">
            
            <!-- Input Area -->
            <form id="todo-form" class="relative mb-8 group">
                <input type="text" id="todo-input" placeholder="Cosa devi fare oggi?" 
                    class="w-full bg-black/20 border border-white/10 rounded-2xl py-4 pl-6 pr-16 text-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-300 shadow-inner" required />
                <button type="submit" 
                    class="absolute right-2 top-2 bottom-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl w-12 flex items-center justify-center transition-transform duration-200 transform hover:scale-105 active:scale-95 shadow-lg">
                    <i class="fas fa-plus"></i>
                </button>
            </form>

            <!-- Loading State -->
            <div id="loading" class="flex justify-center flex-1 items-center">
                <div class="cube-wrapper">
                    <div class="cube-folding">
                        <span class="leaf1"></span>
                        <span class="leaf2"></span>
                        <span class="leaf3"></span>
                        <span class="leaf4"></span>
                    </div>
                </div>
            </div>

            <!-- List of Todos -->
            <div class="flex-1 overflow-y-auto px-2 custom-scrollbar hidden" id="todo-list-container">
                <ul id="todo-list" class="space-y-4 pb-4">
                    <!-- Tasks will be injected here via app.js -->
                </ul>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center text-slate-500 opacity-60">
                <i class="far fa-check-circle text-6xl mb-4 text-slate-600"></i>
                <p class="text-xl font-medium">Nessuna task presente.</p>
                <p>Goditi il tuo tempo libero!</p>
            </div>
            
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 bg-white/10 backdrop-blur-md border border-white/10 text-white px-6 py-4 rounded-xl shadow-2xl z-50">
        <div id="toast-icon" class="text-green-400 text-xl"><i class="fas fa-check-circle"></i></div>
        <p id="toast-message" class="font-medium">Task aggiunta con successo!</p>
    </div>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
