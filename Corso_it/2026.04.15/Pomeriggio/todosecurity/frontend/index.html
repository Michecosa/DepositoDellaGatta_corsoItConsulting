<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Security - Dashboard</title>
    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div id="app" class="app-container">
        <!-- Auth View -->
        <div id="auth-view" class="view hidden">
            <div class="auth-card">
                <div class="auth-header">
                    <h1 id="auth-title">Bentornato</h1>
                    <p id="auth-subtitle">Inserisci le tue credenziali per accedere</p>
                </div>
                
                <form id="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" placeholder="Inserisci username" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Inserisci password" required>
                        </div>
                    </div>

                    <div id="reg-fields" class="hidden">
                        <div class="form-group">
                            <label for="ruolo">Ruolo</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user-tag"></i>
                                <select id="ruolo">
                                    <option value="ROLE_USER">Utente</option>
                                    <option value="ROLE_ADMIN">Amministratore</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" id="auth-submit" class="btn btn-primary btn-block">
                        <span id="auth-btn-text">Accedi</span>
                        <div id="auth-loader" class="loader hidden"></div>
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p id="toggle-auth">Non hai un account? <a href="#" id="switch-to-register">Registrati</a></p>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view hidden">
            <header class="app-header">
                <div class="header-left">
                    <div class="logo">
                        <i class="fas fa-check-double"></i>
                        <span>TodoSec</span>
                    </div>
                </div>
                <div class="header-right">
                    <span id="user-display" class="user-name"></span>
                    <button id="logout-btn" class="btn btn-icon" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                    <button id="theme-toggle" class="btn btn-icon" title="Cambia Tema">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </header>

            <main class="dashboard-content">
                <div class="todo-header">
                    <h2>I miei Task</h2>
                    <button id="open-add-modal" class="btn btn-success">
                        <i class="fas fa-plus"></i> <span class="hide-mobile">Nuovo Task</span>
                    </button>
                </div>

                <div id="todo-list" class="todo-grid">
                    <!-- Tasks will be injected here -->
                    <div id="todo-loading" class="list-loader-container">
                        <div class="loader"></div>
                        <p>Caricamento task...</p>
                    </div>
                    <div id="todo-empty" class="empty-state hidden">
                        <i class="fas fa-clipboard-list"></i>
                        <p>Nessun task trovato. Inizia a crearne uno!</p>
                    </div>
                </div>
            </main>
        </div>

        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modal-title">Nuovo Task</h3>
                    <button id="close-modal" class="btn-close">&times;</button>
                </div>
                <form id="todo-form">
                    <input type="hidden" id="todo-id">
                    <div class="form-group">
                        <label for="todo-titolo">Titolo</label>
                        <input type="text" id="todo-titolo" placeholder="Cosa devi fare?" required>
                    </div>
                    <div class="form-group">
                        <label for="todo-descrizione">Descrizione</label>
                        <textarea id="todo-descrizione" placeholder="Dettagli aggiuntivi (opzionale)" rows="4"></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="cancel-todo" class="btn btn-secondary">Annulla</button>
                        <button type="submit" class="btn btn-primary">Salva Task</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Local JS -->
    <script src="app.js"></script>
</body>
</html>
